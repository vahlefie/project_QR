{% extends "admin_layout.html" %}

{% block content %}
<div class="card">
    <h3>Payment Client</h3>

    {% if message %}
        <p class="success-text">{{ message }}</p>
    {% endif %}

    {% if error %}
        <p class="danger-text">{{ error }}</p>
    {% endif %}

    <div class="subtle-panel">
        <h4>Input Payment</h4>
        <form action="/admin/payment/input" method="POST">
            <div class="form-grid">
                <label>
                    <span>Client *</span>
                    <select name="owner_user_id" required>
                        <option value="">Pilih client</option>
                        {% for account in clients %}
                            <option value="{{ account.id }}" {% if selected_owner_user_id == account.id %}selected{% endif %}>
                                {{ account.nama or account.username }}{% if account.no_hp %} - {{ account.no_hp }}{% endif %}
                            </option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    <span>Tanggal Payment *</span>
                    <input type="date" name="payment_date" value="{{ today }}" required>
                </label>

                <label>
                    <span>Waktu Payment *</span>
                    <input type="time" name="payment_time" required>
                </label>

                <label>
                    <span>Nominal *</span>
                    <input type="text" name="amount" inputmode="numeric" placeholder="Contoh: 150000" required>
                </label>

                <label>
                    <span>Metode</span>
                    <select name="payment_method">
                        <option value="Transfer">Transfer</option>
                        <option value="Cash">Cash</option>
                        <option value="QRIS">QRIS</option>
                        <option value="Virtual Account">Virtual Account</option>
                    </select>
                </label>

                <label>
                    <span>Bank Asal</span>
                    <select name="origin_bank" id="originBankInput" required>
                        <option value="">Pilih bank</option>
                        <option value="N/A" data-na-option>N/A</option>
                        {% for bank in bank_options %}
                            <option value="{{ bank }}">{{ bank }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    <span>Nomor Rekening</span>
                    <input
                        type="text"
                        name="account_number"
                        id="accountNumberInput"
                        inputmode="numeric"
                        minlength="10"
                        maxlength="16"
                        pattern="[0-9]{10,16}"
                        title="Nomor Rekening harus 10 - 16 digit angka"
                        required
                    >
                </label>

                <label>
                    <span>Jenis Bayar *</span>
                    <select name="payment_type" required>
                        {% for payment_type in payment_type_options %}
                            <option value="{{ payment_type }}">{{ payment_type }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    <span>Paket *</span>
                    <select name="package_name" required>
                        {% for package in package_options %}
                            <option value="{{ package }}">{{ package|capitalize }}</option>
                        {% endfor %}
                    </select>
                </label>

                <label>
                    <span>Periode Mulai *</span>
                    <input type="date" name="period_start" id="periodStartInput" required>
                </label>

                <label>
                    <span>Periode Akhir *</span>
                    <input
                        type="date"
                        name="period_end"
                        id="periodEndInput"
                        min="{{ min_period_end_date }}"
                        data-base-min="{{ min_period_end_date }}"
                        required
                    >
                </label>

                <label>
                    <span>Catatan</span>
                    <input type="text" name="notes" maxlength="255" placeholder="Opsional">
                </label>
            </div>

            <div class="form-grid wide-form-grid">
                <label>
                    <span>Nama Event *</span>
                    <input type="text" name="event_name" maxlength="120" required>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="success-button">Input Payment</button>
            </div>
        </form>
    </div>
</div>

<script>
    const paymentMethodSelect = document.querySelector("select[name='payment_method']");
    const originBankInput = document.getElementById("originBankInput");
    const accountNumberInput = document.getElementById("accountNumberInput");
    const originBankNaOption = originBankInput ? originBankInput.querySelector("[data-na-option]") : null;
    const periodStartInput = document.getElementById("periodStartInput");
    const periodEndInput = document.getElementById("periodEndInput");

    function syncTransferFields() {
        const isTransfer = paymentMethodSelect.value === "Transfer";
        if (originBankNaOption) {
            originBankNaOption.hidden = isTransfer;
            originBankNaOption.disabled = isTransfer;
        }

        originBankInput.disabled = !isTransfer;
        originBankInput.required = isTransfer;
        originBankInput.classList.toggle("na-display-field", !isTransfer);
        accountNumberInput.disabled = !isTransfer;
        accountNumberInput.required = isTransfer;
        accountNumberInput.classList.toggle("na-display-field", !isTransfer);

        if (!isTransfer) {
            originBankInput.value = "N/A";
            accountNumberInput.value = "N/A";
        } else {
            if (originBankInput.value === "N/A") {
                originBankInput.value = "";
            }
            if (accountNumberInput.value === "N/A") {
                accountNumberInput.value = "";
            }
        }
    }

    function syncPeriodEndMin() {
        const baseMin = periodEndInput.dataset.baseMin || periodEndInput.min;
        const selectedStart = periodStartInput.value;
        const nextMin = selectedStart && selectedStart > baseMin ? selectedStart : baseMin;
        periodEndInput.min = nextMin;

        if (periodEndInput.value && periodEndInput.value < nextMin) {
            periodEndInput.value = nextMin;
        }
    }

    if (paymentMethodSelect && originBankInput && accountNumberInput) {
        paymentMethodSelect.addEventListener("change", syncTransferFields);
        syncTransferFields();
    }

    if (periodStartInput && periodEndInput) {
        periodStartInput.addEventListener("change", syncPeriodEndMin);
        syncPeriodEndMin();
    }
</script>
{% endblock %}
