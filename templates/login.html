<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="center">
        <div class="card login-card">
            <h2>Login</h2>
            <form method="POST">
                <input type="text" name="identifier" placeholder="Email / No HP" required>
                <div class="password-field">
                    <input type="password" name="password" placeholder="Password" required>
                    <button
                        type="button"
                        class="password-toggle-button"
                        aria-label="Tampilkan password"
                        title="Tampilkan password"
                    ></button>
                </div>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </div>
    {% if login_error_message %}
        <div class="confirm-modal" id="loginErrorModal" aria-hidden="false">
            <div class="confirm-dialog login-error-dialog" role="dialog" aria-modal="true" aria-labelledby="loginErrorTitle">
                <h4 id="loginErrorTitle">Login Gagal</h4>
                <p class="modal-message login-error-message">{{ login_error_message }}</p>
                <div class="confirm-actions single-action">
                    <button type="button" class="danger-button" id="closeLoginErrorButton">Tutup</button>
                </div>
            </div>
        </div>
    {% endif %}
    <script src="{{ url_for('static', filename='password_toggle.js') }}"></script>
    <script>
        const loginErrorModal = document.getElementById("loginErrorModal");
        const closeLoginErrorButton = document.getElementById("closeLoginErrorButton");

        if (loginErrorModal && closeLoginErrorButton) {
            closeLoginErrorButton.addEventListener("click", () => {
                loginErrorModal.classList.add("is-hidden");
                loginErrorModal.setAttribute("aria-hidden", "true");
            });
        }
    </script>
</body>
</html>
