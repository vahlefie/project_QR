{% extends "admin_layout.html" %}

{% block content %}
<div class="card">
    <h3>Tambah Client</h3>
    <p>Isi data client baru. Tanggal daftar akan dibuat otomatis saat data disimpan.</p>

    {% if error %}
        <p class="danger-text">{{ error }}</p>
    {% endif %}

    <form method="POST" class="user-form">
        <div class="form-grid">
            <label>
                <span>Nama Lengkap*</span>
                <input
                    type="text"
                    name="nama"
                    maxlength="30"
                    pattern="[A-Za-z ]+"
                    title="Nama hanya boleh berisi huruf"
                    value="{{ form_data.get('nama', '') }}"
                    required
                >
            </label>

            <label>
                <span>Password*</span>
                <div class="password-row">
                    <div class="password-field">
                        <input
                            id="passwordInput"
                            type="password"
                            name="password"
                            minlength="8"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}"
                            title="Password minimal 8 karakter dan harus kombinasi huruf besar, huruf kecil, dan angka"
                            required
                        >
                        <button
                            type="button"
                            class="password-toggle-button"
                            aria-label="Tampilkan password"
                            title="Tampilkan password"
                        ></button>
                    </div>
                    <button type="button" class="secondary-button generate-button" id="generatePasswordButton">
                        Generate
                    </button>
                </div>
            </label>

            <div class="generated-password form-wide">
                <label>
                    <span>Hasil Generate Password</span>
                    <div class="password-row">
                        <input id="generatedPasswordOutput" type="text" readonly>
                        <button type="button" class="secondary-button copy-button" id="copyPasswordButton">
                            Copy
                        </button>
                    </div>
                </label>
                <p class="hint" id="copyPasswordHint">Password hasil generate akan tampil di sini.</p>
            </div>

            <label>
                <span>No HP*</span>
                <div class="phone-input">
                    <span>+62</span>
                    <input
                        id="phoneLocalInput"
                        type="text"
                        inputmode="numeric"
                        minlength="8"
                        pattern="(08[0-9]{6,}|8[0-9]{7,})"
                        title="No HP minimal 8 digit, hanya angka, dan harus diawali 08 atau 8"
                        value="{% if form_data.get('no_hp', '').startswith('62') %}{{ form_data.get('no_hp', '')[2:] }}{% else %}{{ form_data.get('no_hp', '') }}{% endif %}"
                        required
                    >
                    <input id="phoneFullInput" type="hidden" name="no_hp">
                </div>
            </label>

            <label>
                <span>Email*</span>
                <input
                    type="text"
                    name="email"
                    maxlength="30"
                    value="{{ form_data.get('email', '') }}"
                    required
                >
            </label>

              <label>
                <span>Perusahaan</span>
                <input
                    type="text"
                    name="perusahaan"
                    maxlength="50"
                    value="{{ form_data.get('perusahaan', '') }}"
                >
            </label>

            <label>
                <span>Alamat</span>
                <input
                    type="text"
                    name="alamat"
                    maxlength="100"
                    value="{{ form_data.get('alamat', '') }}"
                >
            </label>

            <label>
                <span>Provinsi</span>
                <div class="search-select" data-search-select>
                    <input
                        id="provinceInput"
                        type="text"
                        name="provinsi"
                        autocomplete="off"
                        value="{{ form_data.get('provinsi', '') }}"
                        placeholder="Pilih / cari provinsi"
                        data-search-input
                    >
                    <button
                        type="button"
                        class="search-select-toggle"
                        aria-label="Buka pilihan provinsi"
                        data-search-toggle
                    ></button>
                    <div class="search-select-menu" id="provinceOptions" role="listbox" hidden></div>
                </div>
            </label>

            <label>
                <span>Kota / Kabupaten</span>
                <div class="search-select is-disabled" data-search-select>
                    <input
                        id="cityInput"
                        type="text"
                        name="kota"
                        maxlength="60"
                        autocomplete="off"
                        value="{{ form_data.get('kota', '') }}"
                        placeholder="Pilih provinsi dahulu"
                        disabled
                        data-search-input
                    >
                    <button
                        type="button"
                        class="search-select-toggle"
                        aria-label="Buka pilihan kota atau kabupaten"
                        disabled
                        data-search-toggle
                    ></button>
                    <div class="search-select-menu" id="cityOptions" role="listbox" hidden></div>
                </div>
            </label>
        </div>

        <div class="form-actions">
            <a class="button-link danger-button" href="/users">Batal</a>
            <button type="submit">Tambah Client</button>
        </div>
    </form>
</div>

<script src="{{ url_for('static', filename='indonesia_regions.js') }}"></script>
<script>
    const passwordInput = document.getElementById("passwordInput");
    const generatedPasswordOutput = document.getElementById("generatedPasswordOutput");
    const generatePasswordButton = document.getElementById("generatePasswordButton");
    const copyPasswordButton = document.getElementById("copyPasswordButton");
    const copyPasswordHint = document.getElementById("copyPasswordHint");
    const userForm = document.querySelector(".user-form");
    const phoneLocalInput = document.getElementById("phoneLocalInput");
    const phoneFullInput = document.getElementById("phoneFullInput");
    const provinceInput = document.getElementById("provinceInput");
    const cityInput = document.getElementById("cityInput");
    const cityOptions = document.getElementById("cityOptions");
    const provinceSelect = provinceInput.closest("[data-search-select]");
    const citySelect = cityInput.closest("[data-search-select]");
    const initialCityValue = cityInput.value;
    const regions = window.INDONESIA_REGIONS || {};
    const provinces = Object.keys(regions);
    let cityItems = [];
    let activeSearchSelect = null;
    const letters = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    const numbers = "0123456789";
    const specials = "!@#$%&*?";
    const allCharacters = letters + numbers + specials;

    function randomCharacter(source) {
        const randomValues = new Uint32Array(1);
        crypto.getRandomValues(randomValues);
        return source[randomValues[0] % source.length];
    }

    function shuffleCharacters(characters) {
        const shuffled = characters.split("");
        for (let index = shuffled.length - 1; index > 0; index -= 1) {
            const randomValues = new Uint32Array(1);
            crypto.getRandomValues(randomValues);
            const randomIndex = randomValues[0] % (index + 1);
            [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
        }
        return shuffled.join("");
    }

    function generatePassword() {
        let password = randomCharacter(letters) + randomCharacter(numbers) + randomCharacter(specials);
        while (password.length < 12) {
            password += randomCharacter(allCharacters);
        }
        return shuffleCharacters(password);
    }

    function getSearchSelectParts(select) {
        return {
            input: select.querySelector("[data-search-input]"),
            menu: select.querySelector(".search-select-menu"),
            toggle: select.querySelector("[data-search-toggle]"),
        };
    }

    function closeSearchSelect(select) {
        if (!select) {
            return;
        }

        const { menu } = getSearchSelectParts(select);
        select.classList.remove("is-open");
        menu.hidden = true;
        if (activeSearchSelect === select) {
            activeSearchSelect = null;
        }
    }

    function closeActiveSearchSelect(exceptSelect = null) {
        if (activeSearchSelect && activeSearchSelect !== exceptSelect) {
            closeSearchSelect(activeSearchSelect);
        }
    }

    function filterSearchItems(items, keyword) {
        const normalizedKeyword = keyword.trim().toLowerCase();
        if (!normalizedKeyword) {
            return items;
        }

        return items.filter((item) => item.toLowerCase().includes(normalizedKeyword));
    }

    function renderSearchOptions(select, items, onSelectItem, keyword = null) {
        const { input, menu } = getSearchSelectParts(select);
        const filteredItems = filterSearchItems(items, keyword === null ? input.value : keyword);
        menu.innerHTML = "";

        if (!filteredItems.length) {
            const emptyState = document.createElement("div");
            emptyState.className = "search-select-empty";
            emptyState.textContent = "Data tidak ditemukan";
            menu.appendChild(emptyState);
            return;
        }

        filteredItems.forEach((item) => {
            const option = document.createElement("button");
            option.type = "button";
            option.className = "search-select-option";
            option.setAttribute("role", "option");
            option.textContent = item;

            option.addEventListener("mousedown", (event) => {
                event.preventDefault();
            });
            option.addEventListener("click", () => {
                input.value = item;
                onSelectItem(item);
                closeSearchSelect(select);
            });

            menu.appendChild(option);
        });
    }

    function openSearchSelect(select, items, onSelectItem, showAll = false) {
        const { input, menu } = getSearchSelectParts(select);
        if (input.disabled) {
            return;
        }

        closeActiveSearchSelect(select);
        renderSearchOptions(select, items, onSelectItem, showAll ? "" : null);
        select.classList.add("is-open");
        menu.hidden = false;
        activeSearchSelect = select;
    }

    function setSearchSelectDisabled(select, isDisabled) {
        const { input, toggle } = getSearchSelectParts(select);
        input.disabled = isDisabled;
        toggle.disabled = isDisabled;
        select.classList.toggle("is-disabled", isDisabled);
        if (isDisabled) {
            closeSearchSelect(select);
        }
    }

    function setupSearchSelect(select, getItems, onSelectItem) {
        const { input, toggle } = getSearchSelectParts(select);

        input.addEventListener("focus", () => openSearchSelect(select, getItems(), onSelectItem));
        input.addEventListener("click", () => openSearchSelect(select, getItems(), onSelectItem));
        input.addEventListener("input", () => {
            if (input === provinceInput && !regions[input.value]) {
                loadCities("");
            }
            openSearchSelect(select, getItems(), onSelectItem);
        });
        input.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeSearchSelect(select);
            }
        });
        toggle.addEventListener("click", () => {
            if (select.classList.contains("is-open")) {
                closeSearchSelect(select);
                return;
            }

            input.focus();
            openSearchSelect(select, getItems(), onSelectItem, true);
        });
    }

    function loadProvinces() {
        if (!provinces.length) {
            provinceInput.placeholder = "Gagal memuat daftar provinsi";
            return;
        }

        if (regions[provinceInput.value]) {
            loadCities(provinceInput.value, initialCityValue);
        } else {
            loadCities("");
        }
    }

    function loadCities(provinceName, selectedCity = "") {
        cityItems = [];
        cityInput.value = "";

        if (!provinceName || !regions[provinceName]) {
            setSearchSelectDisabled(citySelect, true);
            cityInput.placeholder = "Pilih provinsi dahulu";
            cityOptions.innerHTML = "";
            return;
        }

        cityItems = regions[provinceName];
        setSearchSelectDisabled(citySelect, false);
        cityInput.value = selectedCity;
        cityInput.placeholder = "Pilih / cari kota atau kabupaten";
    }

    provinceInput.addEventListener("change", () => {
        loadCities(provinceInput.value);
    });

    setupSearchSelect(provinceSelect, () => provinces, (provinceName) => {
        loadCities(provinceName);
    });
    setupSearchSelect(citySelect, () => cityItems, (cityName) => {
        cityInput.value = cityName;
    });

    document.addEventListener("click", (event) => {
        if (!event.target.closest("[data-search-select]")) {
            closeActiveSearchSelect();
        }
    });

    generatePasswordButton.addEventListener("click", () => {
        const password = generatePassword();
        passwordInput.value = password;
        generatedPasswordOutput.value = password;
        copyPasswordHint.textContent = "Password siap digunakan dan bisa di-copy.";
    });

    copyPasswordButton.addEventListener("click", async () => {
        if (!generatedPasswordOutput.value) {
            copyPasswordHint.textContent = "Generate password terlebih dahulu.";
            return;
        }

        try {
            await navigator.clipboard.writeText(generatedPasswordOutput.value);
            copyPasswordHint.textContent = "Password berhasil di-copy.";
        } catch (error) {
            generatedPasswordOutput.select();
            document.execCommand("copy");
            copyPasswordHint.textContent = "Password berhasil di-copy.";
        }
    });

    userForm.addEventListener("submit", () => {
        let localNumber = phoneLocalInput.value.trim();
        if (localNumber.startsWith("62")) {
            localNumber = localNumber.slice(2);
        }
        if (localNumber.startsWith("0")) {
            localNumber = localNumber.slice(1);
        }
        phoneFullInput.value = `62${localNumber}`;
    });

    loadProvinces();
</script>
{% endblock %}
