<html>
<head>
    <title>QR Scanner ke GSheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #reader { width: 300px; margin: 0 auto; }
        #status { margin-top: 20px; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Scan QR Code</h2>
    <div id="reader"></div>
    <div id="status">Siap memindai...</div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbzf1JjPiBQ-Xw9KlCl3-l47FPgTOfxfKLyuTw24QVWZLBn4XGmfpVwHD7S8CktoRyqi/exec";

        function onScanSuccess(decodedText, decodedResult) {
            // Berhenti scan sebentar agar tidak double input
            html5QrcodeScanner.clear();
            document.getElementById('status').innerText = "Mengirim data: " + decodedText;

            // Kirim data ke Google Sheets via Fetch API
            fetch(`${webAppUrl}?data=${encodeURIComponent(decodedText)}`, {
                mode: 'no-cors' // Penting untuk menghindari masalah CORS di Apps Script
            })
            .then(() => {
                document.getElementById('status').innerText = "Data Berhasil Dicatat: " + decodedText;
                // Mulai ulang scanner setelah 2 detik
                setTimeout(() => {
                    location.reload(); 
                }, 2000);
            })
            .catch(err => {
                alert("Gagal mengirim data: " + err);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 }
        );
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
